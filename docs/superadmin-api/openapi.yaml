openapi: 3.0.3
info:
  title: MySupporttaShop Superadmin API
  version: 1.2.0
  description: |
    Superadmin API consumed by web and Flutter clients.
    Authentication is cookie-session based (Supabase session cookies).
servers:
  - url: https://your-superadmin-domain
    description: Production
  - url: https://your-preview-domain
    description: Preview

security:
  - cookieAuth: []

tags:
  - name: Auth
  - name: Health
  - name: Dashboard
  - name: Orders
  - name: Vendors
  - name: Analytics
  - name: Email

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login superadmin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: info@supporttasolutions.com
              password: superadmin123
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                success: true
                data:
                  user:
                    id: 7682db4a-c7d2-4bf5-bf9a-a42c120fd94f
                    email: info@supporttasolutions.com
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              example:
                success: true
                data:
                  message: Logged out
                timestamp: "2026-03-06T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh active session
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
              example:
                success: true
                data:
                  user:
                    id: 7682db4a-c7d2-4bf5-bf9a-a42c120fd94f
                    email: info@supporttasolutions.com
                  expires_at: 1760001000
                timestamp: "2026-03-06T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/health:
    get:
      tags: [Health]
      summary: Service health check
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                success: true
                data:
                  status: healthy
                  version: 1.0.0
                  environment: production
                timestamp: "2026-03-06T12:00:00.000Z"

  /api/v1/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
              example:
                success: true
                data:
                  total_vendors: 42
                  total_orders: 320
                  total_revenue: 2560000
                  total_commission: 192000
                  new_vendors_this_month: 6
                  new_orders_today: 11
                  pending_orders: 28
                  active_vendors: 35
                  recent_orders:
                    - id: 4fce9259-0e49-47f0-b1cf-b07fceadf3a1
                      store_id: b93f456f-6a16-4b32-80bc-ec7ad112a22f
                      vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                      customer_name: Rahul K
                      customer_email: rahul@example.com
                      customer_phone: "9876543210"
                      total: 1499
                      commission: 120
                      payment_status: paid
                      order_status: processing
                      created_at: "2026-03-05T09:10:00.000Z"
                  recent_vendors:
                    - id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                      email: vendor@example.com
                      full_name: Vendor Owner
                      phone: "9876543210"
                      role: vendor
                      owner_role: vendor_owner
                      is_active: true
                      created_at: "2026-02-28T12:30:00.000Z"
                timestamp: "2026-03-06T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/orders:
    get:
      tags: [Orders]
      summary: List orders with pagination and filters
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: order_status
          schema:
            type: string
            enum: [all, pending, processing, shipped, delivered, cancelled]
            default: all
        - in: query
          name: payment_status
          schema:
            type: string
            enum: [all, pending, paid, failed, refunded]
            default: all
        - in: query
          name: vendor_id
          schema:
            type: string
            default: all
        - in: query
          name: from_date
          schema:
            type: string
            example: "2026-03-01"
        - in: query
          name: to_date
          schema:
            type: string
            example: "2026-03-31"
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersListResponse"
              example:
                success: true
                data:
                  - id: 4fce9259-0e49-47f0-b1cf-b07fceadf3a1
                    store_id: b93f456f-6a16-4b32-80bc-ec7ad112a22f
                    vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                    customer_name: Rahul K
                    customer_email: rahul@example.com
                    customer_phone: "9876543210"
                    total: 1499
                    commission: 120
                    payment_status: paid
                    order_status: processing
                    created_at: "2026-03-05T09:10:00.000Z"
                    store:
                      id: b93f456f-6a16-4b32-80bc-ec7ad112a22f
                      vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                      name: Chennai Foods
                      slug: chennai-foods
                      description: South Indian snacks and meals
                      logo_url: https://cdn.example.com/store-logo.png
                      banner_url: https://cdn.example.com/store-banner.png
                      address: 12 Gandhi Road
                      city: Chennai
                      state: Tamil Nadu
                      district: Chennai
                      pincode: "600001"
                      status: active
                      is_published: true
                      total_products: 38
                      total_orders: 510
                      total_revenue: 1230000
                      created_at: "2025-12-12T08:00:00.000Z"
                meta:
                  total: 320
                  page: 1
                  limit: 10
                  total_pages: 32
                  has_next: true
                  has_prev: false
                summary:
                  total_revenue: 2560000
                  total_commission: 192000
                sort_by: created_at
                sort_order: desc
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/orders/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPathParam"
    get:
      tags: [Orders]
      summary: Get order details by id
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
              example:
                success: true
                data:
                  id: 4fce9259-0e49-47f0-b1cf-b07fceadf3a1
                  store_id: b93f456f-6a16-4b32-80bc-ec7ad112a22f
                  vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                  customer_name: Rahul K
                  customer_email: rahul@example.com
                  customer_phone: "9876543210"
                  total: 1499
                  commission: 120
                  payment_status: paid
                  order_status: processing
                  created_at: "2026-03-05T09:10:00.000Z"
                  order_items:
                    - id: 8ec27f9e-c07d-44aa-a0cd-a9398956d8d0
                      order_id: 4fce9259-0e49-47f0-b1cf-b07fceadf3a1
                      product_name: Mini Samosa Box
                      product_image: https://cdn.example.com/samosa.png
                      quantity: 2
                      price: 299
                      total: 598
                timestamp: "2026-03-06T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/orders/{id}/status:
    parameters:
      - $ref: "#/components/parameters/IdPathParam"
    patch:
      tags: [Orders]
      summary: Update order status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
            example:
              order_status: shipped
      responses:
        "200":
          description: Updated order payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/vendors:
    get:
      tags: [Vendors]
      summary: List vendors with pagination and filters
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, suspended]
            default: all
      responses:
        "200":
          description: Paginated vendors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorsListResponse"
              example:
                success: true
                data:
                  - id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                    email: vendor@example.com
                    full_name: Vendor Owner
                    phone: "9876543210"
                    role: vendor
                    owner_role: vendor_owner
                    is_active: true
                    created_at: "2026-02-28T12:30:00.000Z"
                    total_products: 38
                    total_orders: 510
                    total_revenue: 1230000
                    commission_earned: 98400
                    store:
                      id: b93f456f-6a16-4b32-80bc-ec7ad112a22f
                      vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                      name: Chennai Foods
                      slug: chennai-foods
                      description: South Indian snacks and meals
                      logo_url: https://cdn.example.com/store-logo.png
                      banner_url: https://cdn.example.com/store-banner.png
                      address: 12 Gandhi Road
                      city: Chennai
                      state: Tamil Nadu
                      district: Chennai
                      pincode: "600001"
                      status: active
                      is_published: true
                      total_products: 38
                      total_orders: 510
                      total_revenue: 1230000
                      created_at: "2025-12-12T08:00:00.000Z"
                meta:
                  total: 42
                  page: 1
                  limit: 10
                  total_pages: 5
                  has_next: true
                  has_prev: false
                sort_by: created_at
                sort_order: desc
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Vendors]
      summary: Create vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorRequest"
            example:
              email: vendor@example.com
              password: vendor123
              full_name: Vendor Owner
              phone: "9876543210"
              owner_role: vendor_owner
              is_active: true
              store_name: Chennai Foods
              slug: chennai-foods
              address: 12 Gandhi Road
              city: Chennai
              state: Tamil Nadu
              district: Chennai
              pincode: "600001"
              description: South Indian snacks and meals
              logo_url: https://cdn.example.com/store-logo.png
              banner_url: https://cdn.example.com/store-banner.png
              theme_id: default
              primary_color: "#e85d2f"
      responses:
        "200":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/vendors/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPathParam"
    get:
      tags: [Vendors]
      summary: Get vendor detail with products and paginated orders
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Vendor detail response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDetailResponse"
              example:
                success: true
                data:
                  vendor:
                    id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                    email: vendor@example.com
                    full_name: Vendor Owner
                    phone: "9876543210"
                    role: vendor
                    owner_role: vendor_owner
                    is_active: true
                    created_at: "2026-02-28T12:30:00.000Z"
                    total_products: 38
                    total_orders: 510
                    total_revenue: 1230000
                    commission_earned: 98400
                  products:
                    - id: 9600dca4-a7ab-4f56-a064-166ed9d16706
                      name: Mini Samosa Box
                      price: 299
                      stock: 120
                      status: active
                      created_at: "2026-02-10T10:00:00.000Z"
                  orders:
                    - id: 4fce9259-0e49-47f0-b1cf-b07fceadf3a1
                      store_id: b93f456f-6a16-4b32-80bc-ec7ad112a22f
                      vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                      customer_name: Rahul K
                      customer_email: rahul@example.com
                      customer_phone: "9876543210"
                      total: 1499
                      commission: 120
                      payment_status: paid
                      order_status: processing
                      created_at: "2026-03-05T09:10:00.000Z"
                  orders_total: 510
                  orders_page: 1
                  orders_limit: 10
                  orders_total_pages: 51
                timestamp: "2026-03-06T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Vendors]
      summary: Update vendor profile/store fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorRequest"
            example:
              full_name: Vendor Owner Updated
              phone: "9999999999"
              store_name: Chennai Foods Prime
              city: Chennai
      responses:
        "200":
          description: Vendor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Vendors]
      summary: Delete vendor
      responses:
        "200":
          description: Vendor deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVendorResponse"
              example:
                success: true
                data:
                  message: Vendor deleted
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/vendors/{id}/status:
    parameters:
      - $ref: "#/components/parameters/IdPathParam"
    patch:
      tags: [Vendors]
      summary: Update vendor active status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorStatusRequest"
            example:
              is_active: false
      responses:
        "200":
          description: Vendor status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/vendors/{id}/products:
    parameters:
      - $ref: "#/components/parameters/IdPathParam"
    get:
      tags: [Vendors]
      summary: List products of a vendor with pagination
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortOrderParam"
      responses:
        "200":
          description: Paginated vendor products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProductsResponse"
              example:
                success: true
                data:
                  - id: 9600dca4-a7ab-4f56-a064-166ed9d16706
                    name: Mini Samosa Box
                    price: 299
                    stock: 120
                    status: active
                    created_at: "2026-02-10T10:00:00.000Z"
                meta:
                  total: 38
                  page: 1
                  limit: 10
                  total_pages: 4
                  has_next: true
                  has_prev: false
                sort_by: created_at
                sort_order: desc
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/analytics/revenue:
    get:
      tags: [Analytics]
      summary: Revenue analytics grouped by day
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
      responses:
        "200":
          description: Revenue analytics response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalyticsResponse"
              example:
                success: true
                data:
                  days: 30
                  points:
                    - date: "2026-03-01"
                      revenue: 15000
                      commission: 1200
                      orders: 8
                    - date: "2026-03-02"
                      revenue: 19200
                      commission: 1536
                      orders: 11
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/analytics/vendors/top:
    get:
      tags: [Analytics]
      summary: Top vendors by paid revenue
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Top vendors analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopVendorsResponse"
              example:
                success: true
                data:
                  limit: 10
                  vendors:
                    - vendor_id: 50ab57ad-bb28-4448-a0e5-d1527324e4b5
                      vendor_name: Chennai Foods
                      vendor_email: vendor@example.com
                      total_revenue: 1230000
                      total_commission: 98400
                      total_orders: 510
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/email/test:
    post:
      tags: [Email]
      summary: Send test email
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEmailRequest"
            example:
              to: qa@example.com
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEmailResponse"
              example:
                success: true
                data:
                  to: qa@example.com
                  message: Test email sent successfully
                timestamp: "2026-03-06T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: Supabase session cookie. Cookie names can vary by environment.

  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SearchParam:
      in: query
      name: search
      schema:
        type: string
        default: ""
    SortByParam:
      in: query
      name: sort_by
      schema:
        type: string
        default: created_at
    SortOrderParam:
      in: query
      name: sort_order
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Validation failed
            details:
              field_errors:
                email:
                  - Invalid email
            timestamp: "2026-03-06T12:00:00.000Z"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Unauthorized
            details: null
            timestamp: "2026-03-06T12:00:00.000Z"
    Forbidden:
      description: Superadmin role required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Forbidden
            details: null
            timestamp: "2026-03-06T12:00:00.000Z"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Resource not found
            details: null
            timestamp: "2026-03-06T12:00:00.000Z"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Too many requests
            details:
              retry_after_seconds: 60
            timestamp: "2026-03-06T12:00:00.000Z"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Already exists
            details: null
            timestamp: "2026-03-06T12:00:00.000Z"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error: Server error
            details: null
            timestamp: "2026-03-06T12:00:00.000Z"

  schemas:
    Timestamp:
      type: string
      format: date-time

    ErrorEnvelope:
      type: object
      required: [success, error, timestamp]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        details:
          nullable: true
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    PaginationMeta:
      type: object
      required: [total, page, limit, total_pages, has_next, has_prev]
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean

    Store:
      type: object
      required:
        [id, vendor_id, name, slug, status, is_published, total_products, total_orders, total_revenue, created_at]
      properties:
        id:
          type: string
          format: uuid
        vendor_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        banner_url:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        pincode:
          type: string
          nullable: true
        status:
          type: string
        is_published:
          type: boolean
        total_products:
          type: integer
        total_orders:
          type: integer
        total_revenue:
          type: number
        created_at:
          type: string
          format: date-time

    VendorOwnerRole:
      type: string
      enum: [vendor_owner, shop_owner]

    Vendor:
      type: object
      required: [id, email, full_name, phone, role, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        role:
          type: string
        owner_role:
          allOf:
            - $ref: "#/components/schemas/VendorOwnerRole"
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        store:
          $ref: "#/components/schemas/Store"
        total_products:
          type: integer
        total_orders:
          type: integer
        total_revenue:
          type: number
        commission_earned:
          type: number

    ProductSummary:
      type: object
      required: [id, name, price, stock, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: number
        stock:
          type: integer
        status:
          type: string
        created_at:
          type: string
          format: date-time

    OrderItem:
      type: object
      required: [id, order_id, product_name, product_image, quantity, price, total]
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        product_name:
          type: string
        product_image:
          type: string
        quantity:
          type: integer
        price:
          type: number
        total:
          type: number

    PaymentStatus:
      type: string
      enum: [pending, paid, failed, refunded]

    OrderStatus:
      type: string
      enum: [pending, processing, shipped, delivered, cancelled]

    Order:
      type: object
      required:
        [id, store_id, vendor_id, customer_name, customer_email, customer_phone, total, commission, payment_status, order_status, created_at]
      properties:
        id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        vendor_id:
          type: string
          format: uuid
        customer_name:
          type: string
        customer_email:
          type: string
          format: email
        customer_phone:
          type: string
        total:
          type: number
        commission:
          type: number
        payment_status:
          $ref: "#/components/schemas/PaymentStatus"
        order_status:
          $ref: "#/components/schemas/OrderStatus"
        created_at:
          type: string
          format: date-time
        store:
          $ref: "#/components/schemas/Store"
        vendor:
          $ref: "#/components/schemas/Vendor"
        order_items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    DashboardStats:
      type: object
      required:
        [total_vendors, total_orders, total_revenue, total_commission, new_vendors_this_month, new_orders_today, pending_orders, active_vendors, recent_orders, recent_vendors]
      properties:
        total_vendors:
          type: integer
        total_orders:
          type: integer
        total_revenue:
          type: number
        total_commission:
          type: number
        new_vendors_this_month:
          type: integer
        new_orders_today:
          type: integer
        pending_orders:
          type: integer
        active_vendors:
          type: integer
        recent_orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        recent_vendors:
          type: array
          items:
            $ref: "#/components/schemas/Vendor"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [user]
          properties:
            user:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                  nullable: true
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    LogoutResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [message]
          properties:
            message:
              type: string
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    RefreshResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [user, expires_at]
          properties:
            user:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                  nullable: true
            expires_at:
              type: integer
              nullable: true
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    HealthResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [status, version, environment]
          properties:
            status:
              type: string
            version:
              type: string
            environment:
              type: string
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    DashboardResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/DashboardStats"
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    OrdersSummary:
      type: object
      required: [total_revenue, total_commission]
      properties:
        total_revenue:
          type: number
        total_commission:
          type: number

    OrdersListResponse:
      type: object
      required: [success, data, meta, summary, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        summary:
          $ref: "#/components/schemas/OrdersSummary"
        sort_by:
          type: string
          nullable: true
        sort_order:
          type: string
          nullable: true
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    OrderResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/Order"
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    CreateVendorRequest:
      type: object
      required:
        [email, password, full_name, phone, store_name, address, city, state, district, pincode]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        full_name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 6
        owner_role:
          $ref: "#/components/schemas/VendorOwnerRole"
        is_active:
          type: boolean
          default: true
        store_name:
          type: string
          minLength: 2
        slug:
          type: string
        address:
          type: string
          minLength: 3
        city:
          type: string
          minLength: 2
        state:
          type: string
          minLength: 2
        district:
          type: string
          minLength: 2
        pincode:
          type: string
          minLength: 4
        description:
          type: string
          default: ""
        logo_url:
          type: string
          default: ""
        banner_url:
          type: string
          default: ""
        theme_id:
          type: string
          default: default
        primary_color:
          type: string
          default: "#e85d2f"

    UpdateVendorRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 6
        owner_role:
          $ref: "#/components/schemas/VendorOwnerRole"
        is_active:
          type: boolean
        store_name:
          type: string
          minLength: 2
        logo_url:
          type: string
        address:
          type: string
          minLength: 3
        city:
          type: string
          minLength: 2
        state:
          type: string
          minLength: 2
        district:
          type: string
          minLength: 2
        pincode:
          type: string
          minLength: 4

    UpdateVendorStatusRequest:
      type: object
      required: [is_active]
      properties:
        is_active:
          type: boolean

    VendorResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/Vendor"
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    VendorDetailData:
      type: object
      required:
        [vendor, products, orders, orders_total, orders_page, orders_limit, orders_total_pages]
      properties:
        vendor:
          $ref: "#/components/schemas/Vendor"
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductSummary"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        orders_total:
          type: integer
        orders_page:
          type: integer
        orders_limit:
          type: integer
        orders_total_pages:
          type: integer

    VendorDetailResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/VendorDetailData"
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    DeleteVendorResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [message]
          properties:
            message:
              type: string
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    VendorProductsResponse:
      type: object
      required: [success, data, meta, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductSummary"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        sort_by:
          type: string
          nullable: true
        sort_order:
          type: string
          nullable: true
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    UpdateOrderStatusRequest:
      type: object
      required: [order_status]
      properties:
        order_status:
          $ref: "#/components/schemas/OrderStatus"

    RevenuePoint:
      type: object
      required: [date, revenue, commission, orders]
      properties:
        date:
          type: string
        revenue:
          type: number
        commission:
          type: number
        orders:
          type: integer

    RevenueAnalyticsResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [days, points]
          properties:
            days:
              type: integer
            points:
              type: array
              items:
                $ref: "#/components/schemas/RevenuePoint"
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    TopVendor:
      type: object
      required:
        [vendor_id, vendor_name, vendor_email, total_revenue, total_commission, total_orders]
      properties:
        vendor_id:
          type: string
          format: uuid
        vendor_name:
          type: string
        vendor_email:
          type: string
          format: email
        total_revenue:
          type: number
        total_commission:
          type: number
        total_orders:
          type: integer

    TopVendorsResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [limit, vendors]
          properties:
            limit:
              type: integer
            vendors:
              type: array
              items:
                $ref: "#/components/schemas/TopVendor"
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    TestEmailRequest:
      type: object
      properties:
        to:
          type: string
          format: email

    TestEmailResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [to, message]
          properties:
            to:
              type: string
              format: email
            message:
              type: string
        timestamp:
          $ref: "#/components/schemas/Timestamp"
